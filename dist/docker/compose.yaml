services:
  byedpi:
    image: sergvuntyped/byedpi:latest
    # Пример команды с новыми опциями (grease и tls-split)
    command: ["--disorder", "1", "--auto=torst", "--grease", "c,g", "--tls-split", "50+s+e"]
    restart: unless-stopped
    user: 1000:1000
    ports:
      - name: SOCKS proxy
        target: 1080
        host_ip: 127.0.0.1
        published: 1080
        protocol: tcp